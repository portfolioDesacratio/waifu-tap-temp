<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Waifu Tap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;800;900&family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100dvh;overflow:hidden;font-family:'Inter','Segoe UI',system-ui,sans-serif;background:#0a0015;color:#fff;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}

/* ─── CANVAS PARTICLES BACKGROUND ─── */
#particles-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}

/* ─── SPIDER WEB OVERLAY ─── */
#spider-web{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;opacity:0.06;}
#spider-web svg{width:100%;height:100%;}

/* ─── ANIMATED BACKGROUND ─── */
#app{width:100%;height:100dvh;display:flex;flex-direction:column;position:relative;z-index:2;overflow:hidden;
  background:linear-gradient(170deg,#0a0015 0%,#1a0a2e 30%,#2d1045 60%,#1a0a2e 80%,#0a0015 100%);}
#app::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(ellipse at 20% 30%,rgba(255,105,180,0.10) 0%,transparent 45%),
             radial-gradient(ellipse at 80% 70%,rgba(200,80,255,0.08) 0%,transparent 45%),
             radial-gradient(ellipse at 50% 10%,rgba(255,150,200,0.06) 0%,transparent 40%);
  animation:bgShift 25s ease-in-out infinite;pointer-events:none;z-index:0;}
@keyframes bgShift{0%{transform:translate(0,0)}25%{transform:translate(-15px,25px)}50%{transform:translate(15px,-20px)}75%{transform:translate(-10px,15px)}100%{transform:translate(0,0)}}

/* ─── FLOATING ORBS ─── */
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:1;opacity:0.12;
  background:radial-gradient(circle at center,rgba(255,105,180,0.4),transparent);}
.orb1{width:350px;height:350px;top:-120px;right:-100px;animation:float1 10s ease-in-out infinite;}
.orb2{width:250px;height:250px;bottom:-80px;left:-80px;animation:float2 12s ease-in-out infinite;}
.orb3{width:180px;height:180px;top:35%;right:-50px;animation:float3 14s ease-in-out infinite;}
.orb4{width:120px;height:120px;top:15%;left:10%;animation:float4 16s ease-in-out infinite;opacity:0.08;}
@keyframes float1{0%,100%{transform:translate(0,0)}33%{transform:translate(-40px,30px)}66%{transform:translate(20px,-20px)}}
@keyframes float2{0%,100%{transform:translate(0,0)}33%{transform:translate(30px,-40px)}66%{transform:translate(-20px,20px)}}
@keyframes float3{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,-30px)}}
@keyframes float4{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,20px)}}

/* ─── SAKURA PETAL FALL (CSS backup for canvas) ─── */
.sakura-petal{position:fixed;pointer-events:none;z-index:1;opacity:0.3;font-size:14px;
  animation:sakuraFall linear infinite;}
@keyframes sakuraFall{0%{transform:translateY(-20px) rotate(0deg) scale(0.8);opacity:0;}10%{opacity:0.4;}100%{transform:translateY(110vh) rotate(720deg) scale(1.2);opacity:0;}}

/* ─── GLASS EFFECT ─── */
.glass{border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}

/* ─── TOP HUD ─── */
#hud{position:relative;z-index:10;padding:14px 16px 8px;display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(180deg,rgba(0,0,0,0.6) 0%,transparent 100%);}
#hud-left{display:flex;align-items:center;gap:8px;}
#hud-title{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:900;background:linear-gradient(135deg,#ffb6d9,#ff69b4,#d084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:0.5px;text-shadow:none;}
#hud-coins{display:flex;align-items:center;gap:5px;background:rgba(255,215,0,0.06);border:1px solid rgba(255,215,0,0.10);border-radius:20px;padding:5px 14px 5px 8px;font-size:16px;font-weight:900;color:#ffd700;text-shadow:0 0 15px rgba(255,215,0,0.1);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
#hud-stars{display:flex;align-items:center;gap:3px;background:rgba(192,132,252,0.05);border:1px solid rgba(192,132,252,0.08);border-radius:20px;padding:5px 12px 5px 8px;font-size:14px;font-weight:800;color:#c084fc;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.hud-right{display:flex;gap:6px;}

/* ─── GAME AREA ─── */
#game{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;z-index:1;}
#waifu-wrap{position:relative;width:260px;height:320px;cursor:pointer;transition:transform 0.12s cubic-bezier(0.16,1,0.3,1);}
#waifu-wrap:active{transform:scale(0.90);}
#waifu-wrap img{width:100%;height:100%;object-fit:contain;
  filter:drop-shadow(0 0 30px rgba(255,100,150,0.15)) drop-shadow(0 0 60px rgba(200,80,200,0.10)) drop-shadow(0 0 100px rgba(255,105,180,0.05));
  transition:filter 0.4s;}
#waifu-wrap:hover img{filter:drop-shadow(0 0 40px rgba(255,100,150,0.25)) drop-shadow(0 0 80px rgba(200,80,200,0.15)) drop-shadow(0 0 120px rgba(255,105,180,0.08));}
#waifu-name{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:800;color:#f5c2e0;margin-top:6px;
  text-shadow:0 0 20px rgba(245,194,224,0.25),0 0 40px rgba(245,194,224,0.1);letter-spacing:1px;}
#tap-hint{font-size:11px;color:rgba(255,255,255,0.15);margin-top:6px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
  animation:hintPulse 3s ease-in-out infinite;}
@keyframes hintPulse{0%,100%{opacity:0.4;}50%{opacity:0.1;}}

/* ─── TAP PARTICLES (элегантно) ─── */
.tap-particle{position:absolute;pointer-events:none;font-family:'Unbounded',sans-serif;
  font-weight:900;text-shadow:0 0 20px currentColor;z-index:20;animation:particleUp 0.9s cubic-bezier(0.16,1,0.3,1) forwards;}
@keyframes particleUp{0%{opacity:1;transform:translateY(0) scale(0.5);filter:blur(0);}100%{opacity:0;transform:translateY(-100px) scale(1.4);filter:blur(4px);}}
.tap-ripple{position:absolute;border-radius:50%;pointer-events:none;z-index:19;
  animation:rippleOut 0.6s ease-out forwards;}
@keyframes rippleOut{0%{width:0;height:0;opacity:0.4;border:2px solid rgba(255,105,180,0.5);}100%{width:200px;height:200px;opacity:0;border:1px solid rgba(255,105,180,0);}}

/* ─── ENERGY BAR ─── */
#energy-wrap{position:relative;z-index:10;padding:2px 16px 4px;}
#energy-bar{display:flex;align-items:center;gap:8px;padding:4px 4px;}
#energy-icon{font-size:12px;width:20px;text-align:center;filter:drop-shadow(0 0 6px rgba(255,200,100,0.2));}
#energy-track{flex:1;height:5px;background:rgba(255,255,255,0.03);border-radius:10px;overflow:hidden;box-shadow:inset 0 0 6px rgba(0,0,0,0.3);}
#energy-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,#c084fc,#f5c2e0,#ff69b4,#ff8aae);width:100%;transition:width 0.3s ease;box-shadow:0 0 14px rgba(255,105,180,0.15);}
#energy-text{font-size:10px;font-weight:800;color:rgba(255,255,255,0.25);min-width:48px;text-align:right;font-variant-numeric:tabular-nums;letter-spacing:0.5px;}

/* ─── NAV ─── */
#nav{position:relative;z-index:10;display:flex;justify-content:space-around;padding:4px 4px 18px;
  background:linear-gradient(0deg,rgba(0,0,0,0.5) 0%,transparent 100%);}
.nav-btn{background:none;border:none;color:rgba(255,255,255,0.2);display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 12px;border-radius:18px;cursor:pointer;transition:all 0.3s cubic-bezier(0.16,1,0.3,1);font-size:8px;font-weight:800;min-width:48px;letter-spacing:0.5px;text-transform:uppercase;}
.nav-btn .nav-icon{font-size:22px;transition:transform 0.2s,filter 0.3s;margin-bottom:1px;}
.nav-btn:active .nav-icon{transform:scale(0.7);}
.nav-btn.active{color:#ff8ec4;background:rgba(255,105,180,0.07);box-shadow:0 0 24px rgba(255,105,180,0.06);}
.nav-btn.active .nav-icon{filter:drop-shadow(0 0 12px rgba(255,105,180,0.3));transform:scale(1.05);}

/* ─── PAGE SYSTEM ─── */
.page-overlay{position:fixed;top:0;left:0;width:100%;height:100dvh;z-index:50;background:rgba(0,0,0,0.5);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:none;animation:fadeIn 0.25s ease-out;}
.page-overlay.show{display:block;}
@keyframes fadeIn{0%{opacity:0;}100%{opacity:1;}}
.page-panel{position:fixed;bottom:0;left:0;width:100%;max-height:87dvh;z-index:51;
  background:linear-gradient(180deg,rgba(20,10,35,0.98) 0%,rgba(15,5,30,0.98) 100%);
  border:1px solid rgba(255,255,255,0.04);border-radius:24px 24px 0 0;display:none;
  animation:slideUp 0.35s cubic-bezier(0.16,1,0.3,1);}
.page-panel.show{display:flex;flex-direction:column;}
@keyframes slideUp{0%{transform:translateY(100%);opacity:0.5;}100%{transform:translateY(0);opacity:1;}}
.page-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 14px;border-bottom:1px solid rgba(255,255,255,0.03);}
.page-header h2{font-family:'Unbounded',sans-serif;font-size:17px;font-weight:800;background:linear-gradient(135deg,#f5c2e0,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.page-close{background:none;border:none;color:rgba(255,255,255,0.15);font-size:22px;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:12px;transition:all 0.2s;font-weight:300;}
.page-close:active{background:rgba(255,255,255,0.03);}
.page-body{flex:1;overflow-y:auto;padding:14px 20px 24px;-webkit-overflow-scrolling:touch;}

/* ─── SHOP ─── */
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding-bottom:16px;}
.shop-card{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-radius:18px;padding:16px;cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden;}
.shop-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);}
.shop-card:active{transform:scale(0.94);background:rgba(245,194,224,0.03);border-color:rgba(245,194,224,0.08);}
.shop-card .s-icon{font-size:30px;margin-bottom:4px;}
.shop-card .s-name{font-size:13px;font-weight:800;color:#eee;font-family:'Unbounded',sans-serif;}
.shop-card .s-desc{font-size:9px;color:rgba(255,255,255,0.3);font-weight:700;margin-top:3px;line-height:1.4;text-transform:uppercase;letter-spacing:0.5px;}
.shop-card .s-price{font-size:14px;font-weight:900;color:#ffd700;margin-top:8px;text-shadow:0 0 10px rgba(255,215,0,0.1);}

/* ─── WAIFUS ─── */
.waifu-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.waifu-card{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-radius:20px;overflow:hidden;cursor:pointer;transition:all 0.25s;display:flex;flex-direction:column;}
.waifu-card:active{transform:scale(0.94);}
.waifu-card.selected{border-color:rgba(245,194,224,0.2);background:rgba(245,194,224,0.04);box-shadow:0 0 30px rgba(245,194,224,0.06);}
.waifu-card .w-img-wrap{width:100%;height:140px;background:rgba(255,255,255,0.02);display:flex;align-items:center;justify-content:center;overflow:hidden;padding:8px;}
.waifu-card .w-img-wrap img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 0 16px rgba(255,100,150,0.08));transition:filter 0.3s;max-height:124px;}
.waifu-card:hover .w-img-wrap img{filter:drop-shadow(0 0 24px rgba(255,100,150,0.18));}
.waifu-card .w-info{padding:10px 12px 14px;flex:1;display:flex;flex-direction:column;gap:4px;}
.waifu-card .w-name{font-size:12px;font-weight:800;color:#eee;font-family:'Unbounded',sans-serif;line-height:1.3;}
.waifu-card .w-rarity{font-size:9px;font-weight:700;color:rgba(255,255,255,0.25);text-transform:uppercase;letter-spacing:0.5px;}
.waifu-card .w-bonus{font-size:10px;font-weight:700;color:#ffd700;}
.waifu-card.selected .w-bonus{color:#4ade80;}
.w-badge{font-size:10px;font-weight:800;padding:5px 10px;border-radius:10px;text-align:center;margin-top:6px;letter-spacing:0.3px;}
.selected-badge{background:rgba(74,222,128,0.1);color:#4ade80;border:1px solid rgba(74,222,128,0.15);}
.free-badge{background:rgba(255,215,0,0.08);color:#ffd700;border:1px solid rgba(255,215,0,0.12);cursor:pointer;transition:all 0.2s;}
.free-badge:active{background:rgba(255,215,0,0.15);}
.locked-badge{background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.04);}
.w-buy-btn{font-size:10px;font-weight:800;padding:8px 14px;border-radius:14px;border:none;background:linear-gradient(135deg,#ff69b4,#d084fc);color:#fff;cursor:pointer;margin-top:6px;transition:all 0.25s cubic-bezier(0.16,1,0.3,1);font-family:'Inter',sans-serif;letter-spacing:0.3px;box-shadow:0 2px 12px rgba(255,105,180,0.2);}
.w-buy-btn:active{transform:scale(0.90);opacity:0.8;}

/* ─── DAILY ─── */
.daily-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin:14px 0;}
.d-day{aspect-ratio:0.8;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;font-weight:700;gap:2px;transition:all 0.3s;}
.d-day .dd-num{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:900;}
.d-day .dd-r{font-size:7px;color:rgba(255,255,255,0.3);font-weight:700;}
.d-day.claimed{border-color:rgba(74,222,128,0.2);background:rgba(74,222,128,0.03);}
.d-day.claimed .dd-r{color:rgba(74,222,128,0.6);}
.d-day.current{border-color:rgba(245,194,224,0.25);background:rgba(245,194,224,0.05);transform:scale(1.06);
  box-shadow:0 0 20px rgba(245,194,224,0.06);}
.d-day.current .dd-num{color:#f5c2e0;}
.d-day.locked{opacity:0.25;}
.daily-btn{width:100%;padding:16px;border:none;border-radius:18px;
  background:linear-gradient(135deg,#ff69b4,#ff8ec4,#ffb6d9);color:#fff;font-size:16px;font-weight:900;cursor:pointer;
  transition:all 0.25s cubic-bezier(0.16,1,0.3,1);margin-top:10px;font-family:'Unbounded',sans-serif;letter-spacing:0.5px;
  box-shadow:0 4px 24px rgba(255,105,180,0.15);}
.daily-btn:hover{box-shadow:0 4px 32px rgba(255,105,180,0.25);}
.daily-btn:active{transform:scale(0.94);}
.daily-btn:disabled{opacity:0.2;cursor:not-allowed;transform:none;box-shadow:none;}

/* ─── LEADERBOARD ─── */
.lb-entry{display:flex;align-items:center;gap:12px;padding:12px 6px;border-bottom:1px solid rgba(255,255,255,0.02);}
.lb-rank{font-size:16px;font-weight:900;min-width:34px;text-align:center;font-family:'Unbounded',sans-serif;}
.lb-rank.gold{color:#ffd700;text-shadow:0 0 15px rgba(255,215,0,0.2);}
.lb-rank.silver{color:#c0c0c0;}
.lb-rank.bronze{color:#cd7f32;}
.lb-ava{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;background:rgba(245,194,224,0.04);}
.lb-info{flex:1;}
.lb-name{font-size:13px;font-weight:800;color:#eee;}
.lb-sub{font-size:9px;color:rgba(255,255,255,0.2);font-weight:700;margin-top:2px;text-transform:uppercase;letter-spacing:0.5px;}
.lb-coins{font-size:14px;font-weight:900;color:#ffd700;font-family:'Unbounded',sans-serif;}

/* ─── REFERRAL ─── */
.ref-section{text-align:center;padding:14px 0;}
.ref-icon{font-size:60px;margin-bottom:12px;filter:drop-shadow(0 0 20px rgba(245,194,224,0.1));}
.ref-title{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:800;background:linear-gradient(135deg,#f5c2e0,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;}
.ref-desc{font-size:12px;color:rgba(255,255,255,0.4);font-weight:700;margin-bottom:18px;line-height:1.6;letter-spacing:0.3px;}
.ref-stats{display:flex;justify-content:center;gap:40px;margin-bottom:18px;}
.ref-stat{text-align:center;}
.ref-stat .rs-v{font-family:'Unbounded',sans-serif;font-size:30px;font-weight:900;background:linear-gradient(135deg,#f5c2e0,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ref-stat .rs-l{font-size:10px;color:rgba(255,255,255,0.2);font-weight:700;margin-top:2px;text-transform:uppercase;letter-spacing:0.5px;}
.ref-link-box{background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.04);border-radius:14px;padding:14px;margin-bottom:14px;font-size:10px;color:rgba(255,255,255,0.3);font-weight:700;word-break:break-all;letter-spacing:0.3px;font-family:monospace;}
.ref-copy-btn{width:100%;padding:16px;border:none;border-radius:18px;
  background:linear-gradient(135deg,#ff69b4,#ff8ec4,#ffb6d9);color:#fff;font-size:14px;font-weight:900;cursor:pointer;
  transition:all 0.25s cubic-bezier(0.16,1,0.3,1);font-family:'Unbounded',sans-serif;letter-spacing:0.5px;
  box-shadow:0 4px 24px rgba(255,105,180,0.12);}
.ref-copy-btn:hover{box-shadow:0 4px 32px rgba(255,105,180,0.2);}
.ref-copy-btn:active{transform:scale(0.94);}

/* ─── AD BUTTON ─── */
#adBanner{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:40;display:none;
  background:linear-gradient(135deg,rgba(255,105,180,0.92),rgba(208,132,252,0.92));
  border-radius:22px;padding:14px 28px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.06);
  cursor:pointer;animation:adUp 0.5s cubic-bezier(0.16,1,0.3,1);
  box-shadow:0 8px 40px rgba(255,105,180,0.15);font-size:14px;font-weight:800;color:#fff;gap:8px;align-items:center;
  font-family:'Unbounded',sans-serif;letter-spacing:0.5px;white-space:nowrap;}
#adBanner:active{transform:translateX(-50%) scale(0.94);}
#adBanner .ad-sub{font-size:10px;color:rgba(255,255,255,0.5);font-weight:700;letter-spacing:0.5px;}
@keyframes adUp{0%{opacity:0;transform:translateX(-50%) translateY(40px);}100%{opacity:1;transform:translateX(-50%) translateY(0);}}

/* ─── AD MODAL ─── */
#adModal{position:fixed;top:0;left:0;width:100%;height:100dvh;z-index:300;background:rgba(0,0,0,0.8);backdrop-filter:blur(24px);display:none;flex-direction:column;align-items:center;justify-content:center;}
#adModal.show{display:flex;}
#adVideo{width:280px;height:180px;background:rgba(255,255,255,0.02);border-radius:20px;border:1px solid rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;font-size:60px;margin-bottom:16px;position:relative;}
#adTimer{font-family:'Unbounded',sans-serif;font-size:56px;font-weight:900;background:linear-gradient(135deg,#f5c2e0,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
#adLabel{font-size:13px;color:rgba(255,255,255,0.2);font-weight:700;letter-spacing:1px;text-transform:uppercase;}
#adReward{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:800;color:#ffd700;margin-top:12px;text-shadow:0 0 20px rgba(255,215,0,0.1);}
#adSkipBtn{padding:12px 32px;border:1px solid rgba(255,255,255,0.06);border-radius:14px;background:rgba(255,255,255,0.02);color:rgba(255,255,255,0.2);font-size:13px;font-weight:800;cursor:pointer;transition:all 0.25s;margin-top:16px;font-family:'Unbounded',sans-serif;letter-spacing:0.5px;}
#adSkipBtn:active{transform:scale(0.94);}
#adCloseBtn{padding:12px 32px;border:none;border-radius:18px;
  background:linear-gradient(135deg,#ff69b4,#ff8ec4,#ffb6d9);color:#fff;font-size:14px;font-weight:900;cursor:pointer;
  transition:all 0.25s cubic-bezier(0.16,1,0.3,1);margin-top:16px;font-family:'Unbounded',sans-serif;letter-spacing:0.5px;

@keyframes toastIn{0%{opacity:0;transform:translateX(-50%) translateY(-20px) scale(0.9);}100%{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}}

/* ─── MODAL ─── */

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
// ─── КОНФИГУРАЦИЯ ───
const API_BASE = 'https://waifutap.alwaysdata.net'; // Адрес API (бекенд)

// ─── STANDA√TNE ШТУКИ (Telegram WebApp SDK) ───
let TG = null;
(function ensureTG() {
  if (typeof window.Telegram !== 'undefined' && window.Telegram.WebApp) {
    TG = window.Telegram.WebApp;
    TG.expand();
    TG.disableVerticalSwipes?.();
    TG.setHeaderColor?.('#0a0015');
    TG.ready();
  } else {
    setTimeout(ensureTG, 100);
  }
})();

// ─── APP HTML ───
document.getElementById('app').innerHTML = `
  <div id="hud">
    <div id="hud-left">
      <div id="hud-title">Waifu Tap</div>
    </div>
    <div class="hud-right">
      <div id="hud-coins">🪙 <span id="coinDisplay">0</span></div>
      <div id="hud-stars">⭐ <span id="starDisplay">0</span></div>
    </div>
  </div>
  <div id="game">
    <div id="waifu-wrap">
      <img id="waifu-img" src="assets/images/waifu1.svg" alt="waifu" draggable="false">
    </div>
    <div id="waifu-name">🌸 Сакура</div>
    <div id="tap-hint">— TAP —</div>
  </div>
  <div id="energy-wrap">
    <div id="energy-bar">
      <span id="energy-icon">⚡</span>
      <div id="energy-track"><div id="energy-fill" style="width:100%"></div></div>
      <span id="energy-text">100/100</span>
    </div>
  </div>
  <div id="nav">
    <button class="nav-btn" data-page="shop" onclick="openPage('shop')"><span class="nav-icon">🛍️</span><span>Магазин</span></button>
    <button class="nav-btn" data-page="waifus" onclick="openPage('waifus')"><span class="nav-icon">🌸</span><span>Вайфу</span></button>
    <button class="nav-btn" data-page="daily" onclick="openPage('daily')"><span class="nav-icon">🎁</span><span>Награды</span></button>
    <button class="nav-btn" data-page="referral" onclick="openPage('referral')"><span class="nav-icon">🔗</span><span>Друзья</span></button>
    <button class="nav-btn" data-page="leaderboard" onclick="openPage('leaderboard')"><span class="nav-icon">🏆</span><span>Топ</span></button>
  </div>
`;

// ─── СОСТОЯНИЕ ───
const state = { user: null, coins: 0, stars: 0, energy: 100, maxEnergy: 100, coinsPerTap: 1,
  totalTaps: 0, waifuId: 1, isGuest: false, tapLevel: 1 };
let toastTimer = null;
let adTimer = null;
const WAIFUS = [
  { id: 1, name: 'Аска Лэнгли', emoji: '🔴', rarity: '✨ Обычная', bonus: '+1 🪙 за тап', color: '#ff4444', mult: 1 },
  { id: 2, name: 'Рей Аянами', emoji: '🔵', rarity: '🔥 Редкая', bonus: '+2 ⚡ энергии', color: '#4488ff', mult: 1 },
  { id: 3, name: 'Пауэр', emoji: '🩸', rarity: '💎 Эпическая', bonus: '×2 🪙 за тап', color: '#ff6622', mult: 2 },
  { id: 4, name: 'Макима', emoji: '🦊', rarity: '👑 Легендарная', bonus: '+50 ⚡ макс.', color: '#cc8844', mult: 1 },
  { id: 5, name: 'Рукия Кучики', emoji: '⚔️', rarity: '👑 Легендарная', bonus: '×3 🪙 за тап', color: '#8844cc', mult: 3 },
  { id: 6, name: 'Йор Брайар', emoji: '🗡️', rarity: '💎 Эпическая', bonus: '+100 ⚡ макс.', color: '#cc2244', mult: 1 },
  { id: 7, name: 'Зеро Цвай', emoji: '👹', rarity: '🔮 Мифическая', bonus: '×5 🪙 за тап', color: '#ff66cc', mult: 5 },
  { id: 8, name: 'Фрирен', emoji: '🧙', rarity: '🔮 Мифическая', bonus: '+5 авт. тапов', color: '#66aaff', mult: 1 }
];
const DAILY = [
  { day: 1, coins: 100, stars: 0 }, { day: 2, coins: 200, stars: 0 },
  { day: 3, coins: 300, stars: 0 }, { day: 4, coins: 500, stars: 1 },
  { day: 5, coins: 800, stars: 0 }, { day: 6, coins: 1200, stars: 2 },
  { day: 7, coins: 2000, stars: 5 }
];

// ─── ПАРС МОНЕТ ───
function fmtCoin(n) {
  if (n >= 1e6) return Math.floor(n/1e5)/10 + 'M';
  if (n >= 1e3) return n.toLocaleString('ru-RU');
  return String(Math.floor(n));
}

// ─── ИНИЦИАЛИЗАЦИЯ ───
async function init() {
  let guestMode = false;
  if (!TG) guestMode = true;

  if (!guestMode) {
    try {
      const ctrl = new AbortController();
      const tm = setTimeout(() => ctrl.abort(), 5000);
      const r = await fetch(API_BASE + '/api/auth', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({initData:TG.initData||'', referrerId:null}), signal: ctrl.signal });
      clearTimeout(tm);
      if (r.ok) {
        const d = await r.json();
        if (d.success) { state.user = d.user; applyUser(d.user); }
        else { guestMode = true; }
      } else { guestMode = true; }
    } catch(e) { guestMode = true; }
  }

  if (guestMode) {
    let gid = localStorage.getItem('wg_id');
    let gnm = localStorage.getItem('wg_name') || 'Анимешник';
    if (!gid) { gid = 'g_' + Math.random().toString(36).substr(2,9); localStorage.setItem('wg_id', gid); }
    try {
      const r = await fetch(API_BASE + '/api/guest/auth', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({guest_id:gid, name:gnm}) });
      if (r.ok) {
        const d = await r.json();
        if (d.success) { state.user = d.user; state.isGuest = true; applyUser(d.user); }
      }
    } catch(e) {}
  }

  loadShop();
  loadWaifus();
  loadLB();
  loadDaily();

  // Реклама раз в 3 минуты
  setTimeout(showAdBanner, 180000);
  setInterval(showAdBanner, 180000);

  if (TG) TG.ready();

  document.getElementById('waifu-wrap').addEventListener('click', onTap);
}

function showAdBanner() {
  const b = document.getElementById('adBanner');
  if (b && state.user) b.style.display = 'flex';
}

function applyUser(u) {
  state.coins = u.coins || 0;
  state.stars = u.stars || 0;
  state.energy = u.energy || 100;
  state.maxEnergy = u.max_energy || 100;
  state.coinsPerTap = u.coins_per_tap || 1;
  state.totalTaps = u.total_taps || 0;
  state.waifuId = u.current_waifu_id || 1;
  state.tapLevel = u.tap_level || 1;
  updateHUD();
  setWaifu(state.waifuId);
  updateAutoTap();
}

function setWaifu(id) {
  const w = WAIFUS.find(x => x.id === id) || WAIFUS[0];
  document.getElementById('waifu-img').src = 'assets/images/waifu' + id + '.svg?' + Date.now();
  document.getElementById('waifu-name').textContent = w.emoji + ' ' + w.name;
}

function updateHUD() {
  document.getElementById('coinDisplay').textContent = fmtCoin(state.coins);
  document.getElementById('starDisplay').textContent = fmtCoin(state.stars);
  const pct = state.maxEnergy > 0 ? Math.max(0, (state.energy / state.maxEnergy) * 100) : 0;
  document.getElementById('energy-fill').style.width = pct + '%';
  document.getElementById('energy-text').textContent = Math.floor(state.energy) + '/' + state.maxEnergy;
}

// ─── ТАП ───
async function onTap(e) {
  if (!state.user) { showToast('⏳ Загрузка...'); return; }
  if (state.energy < 1) { showToast('⚡ Нет энергии! Купи в магазине'); return; }

  state.energy = Math.max(0, state.energy - 1);
  // Множитель от текущей вайфу
  const w = WAIFUS.find(x => x.id === state.waifuId) || WAIFUS[0];
  const earn = state.coinsPerTap * (w.mult || 1);
  state.coins += earn;
  updateHUD();

  // Элегантный эффект тапа — 1 частица + ripple
  spawnParticle(e, earn);

  if (navigator.vibrate) navigator.vibrate(8);

  try {
    await fetch(API_BASE + '/api/tap', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ telegram_id: state.user.telegram_id }) });
  } catch(e) {}
}

function spawnParticle(e, amount) {
  const wrap = document.getElementById('waifu-wrap');
  const rect = wrap.getBoundingClientRect();
  const cx = e.clientX || rect.left + rect.width/2;
  const cy = e.clientY || rect.top + rect.height/3;

  // +coin текст
  const el = document.createElement('div');
  el.className = 'tap-particle';
  el.textContent = '+🪙' + amount;
  el.style.left = (cx - rect.left + (Math.random()-0.5)*30) + 'px';
  el.style.top = (cy - rect.top - 10) + 'px';
  el.style.fontSize = (18 + Math.random()*8) + 'px';
  const colors = ['#ffd700', '#ff69b4', '#ff8ec4', '#ffb6d9'];
  el.style.color = colors[Math.floor(Math.random() * colors.length)];
  el.style.textShadow = `0 0 20px ${el.style.color}, 0 0 40px ${el.style.color}`;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 900);

  // ripple effect
  const ripple = document.createElement('div');
  ripple.className = 'tap-ripple';
  ripple.style.left = (cx - rect.left - 100) + 'px';
  ripple.style.top = (cy - rect.top - 100) + 'px';
  ripple.style.borderColor = 'rgba(255,105,180,0.3)';
  wrap.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);
}

let autoTapInterval = null;
function updateAutoTap() {
  if (autoTapInterval) { clearInterval(autoTapInterval); autoTapInterval = null; }
  // Автотапы если включены (Фрирен или куплен автокликер)
  if (state.user && state.waifuId === 8) {
    autoTapInterval = setInterval(() => {
      if (!state.user || state.energy < 1) return;
      // Тап без визуала (тихий)
      state.energy = Math.max(0, state.energy - 1);
      const w = WAIFUS.find(x => x.id === state.waifuId) || WAIFUS[0];
      state.coins += state.coinsPerTap * (w.mult || 1);
      updateHUD();
      fetch(API_BASE + '/api/tap', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ telegram_id: state.user.telegram_id }) }).catch(()=>{});
    }, 1000);
  }
}

// ─── SAKURA PARTICLE SYSTEM ───
(function() {
  const canvas = document.getElementById('particles-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  let animId = null;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  const COLORS = ['rgba(255,182,193,0.5)', 'rgba(255,105,180,0.4)', 'rgba(255,192,203,0.45)', 'rgba(255,218,185,0.35)', 'rgba(238,130,238,0.3)'];
  const PETAL_COUNTS = [40, 50, 60];
  const PETAL_SIZES = [
    { w: [5,12], h: [3,7] },
    { w: [4,10], h: [2,6] },
    { w: [6,14], h: [3,8] }
  ];

  function createPetal() {
    const sizeIdx = Math.floor(Math.random() * PETAL_SIZES.length);
    const s = PETAL_SIZES[sizeIdx];
    return {
      x: Math.random() * W,
      y: -20 - Math.random() * 100,
      w: s.w[0] + Math.random() * (s.w[1] - s.w[0]),
      h: s.h[0] + Math.random() * (s.h[1] - s.h[0]),
      vx: -0.3 - Math.random() * 0.6,
      vy: 0.4 + Math.random() * 0.8,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.03,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      swing: Math.random() * 2,
      swingSpeed: 0.01 + Math.random() * 0.02,
      swingOffset: Math.random() * Math.PI * 2,
      opacity: 0.2 + Math.random() * 0.4
    };
  }

  function initParticles(count) {
    particles = [];
    for (let i = 0; i < count; i++) {
      const p = createPetal();
      p.y = Math.random() * H;
      particles.push(p);
    }
  }

  function drawPetal(p) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotation);
    ctx.globalAlpha = p.opacity;
    
    // Рисуем лепесток сакуры
    ctx.beginPath();
    ctx.moveTo(0, -p.h/2);
    ctx.bezierCurveTo(p.w/2, -p.h/3, p.w/2, p.h/3, 0, p.h/2);
    ctx.bezierCurveTo(-p.w/2, p.h/3, -p.w/2, -p.h/3, 0, -p.h/2);
    ctx.closePath();
    
    ctx.fillStyle = p.color;
    ctx.fill();
    
    // Тонкая прожилка
    ctx.beginPath();
    ctx.moveTo(0, -p.h/2);
    ctx.lineTo(0, p.h/2);
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 0.3;
    ctx.stroke();
    
    ctx.restore();
  }

  function updatePetal(p) {
    p.swingOffset += p.swingSpeed;
    p.x += p.vx + Math.sin(p.swingOffset) * 0.3;
    p.y += p.vy;
    p.rotation += p.rotSpeed;
    
    // Имитация ветра — иногда порыв
    if (Math.random() < 0.002) {
      p.vx += (Math.random() - 0.5) * 0.5;
      p.vy += (Math.random() - 0.5) * 0.3;
    }
    
    if (p.y > H + 30 || p.x < -50 || p.x > W + 50) {
      Object.assign(p, createPetal());
      p.y = -20 - Math.random() * 50;
    }
  }

  function animate() {
    ctx.clearRect(0, 0, W, H);
    for (const p of particles) {
      updatePetal(p);
      drawPetal(p);
    }
    animId = requestAnimationFrame(animate);
  }

  // Определяем количество частиц по размеру экрана
  let count = PETAL_COUNTS[1];
  if (W < 380) count = PETAL_COUNTS[0];
  else if (W > 600) count = PETAL_COUNTS[2];
  
  initParticles(count);
  animate();
})();

// ─── СТАРТ ───
document.addEventListener('DOMContentLoaded', init);
if (document.readyState === 'complete') init();
</script>
</body>
</html>
