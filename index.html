<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Waifu Tap</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100dvh;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0a0a12;color:#eee;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
html{font-family:'Inter','Segoe UI',system-ui,sans-serif;}

/* ─── APP ─── */
#app{width:100%;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden;
  background:radial-gradient(ellipse at 50% 0%,#1a0a20 0%,#0d0a15 50%,#0a0a12 100%);}
#app::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");pointer-events:none;z-index:0;}

/* ─── TOP HUD ─── */
#hud{position:relative;z-index:10;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,rgba(0,0,0,0.6) 0%,transparent 100%);}
#hud-coins{display:flex;align-items:center;gap:6px;background:rgba(255,215,0,0.08);border:1px solid rgba(255,215,0,0.15);border-radius:16px;padding:6px 14px 6px 10px;font-size:18px;font-weight:900;color:#ffd700;text-shadow:0 0 15px rgba(255,215,0,0.2);}
#hud-stars{display:flex;align-items:center;gap:4px;background:rgba(245,194,224,0.08);border:1px solid rgba(245,194,224,0.15);border-radius:16px;padding:6px 14px 6px 10px;font-size:16px;font-weight:800;color:#f5c2e0;}
.hud-right{display:flex;gap:8px;}

/* ─── GAME AREA ─── */
#game{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;z-index:1;overflow:hidden;}
#waifu-wrap{position:relative;width:280px;height:340px;cursor:pointer;transition:transform 0.1s;}
#waifu-wrap:active{transform:scale(0.94);}
#waifu-wrap img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 0 30px rgba(255,100,150,0.15));transition:filter 0.3s;}
#waifu-name{font-size:16px;font-weight:800;color:#f5c2e0;margin-top:8px;text-shadow:0 0 10px rgba(245,194,224,0.3);letter-spacing:0.5px;}
#tap-hint{font-size:12px;color:#666;margin-top:4px;font-weight:600;}

/* ─── TAP PARTICLES ─── */
.tap-particle{position:absolute;pointer-events:none;font-size:20px;font-weight:900;color:#ffd700;text-shadow:0 0 10px rgba(255,215,0,0.5);animation:floatUp 1s ease-out forwards;z-index:20;}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(0.5);}100%{opacity:0;transform:translateY(-120px) scale(1.2);}}

/* ─── ENERGY BAR ─── */
#energy-wrap{position:relative;z-index:10;padding:8px 16px 4px;}
#energy-bar{display:flex;align-items:center;gap:8px;padding:0 4px;}
#energy-icon{font-size:12px;}
#energy-track{flex:1;height:8px;background:rgba(255,255,255,0.05);border-radius:10px;overflow:hidden;}
#energy-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,#f5c2e0,#ff69b4);width:100%;transition:width 0.3s ease;box-shadow:0 0 8px rgba(255,105,180,0.3);}
#energy-text{font-size:11px;font-weight:700;color:#999;min-width:45px;text-align:right;font-variant-numeric:tabular-nums;}

/* ─── NAV ─── */
#nav{position:relative;z-index:10;display:flex;justify-content:space-around;padding:6px 8px 16px;background:linear-gradient(0deg,rgba(0,0,0,0.6) 0%,transparent 100%);}
.nav-btn{background:none;border:none;color:#666;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 12px;border-radius:12px;cursor:pointer;transition:all 0.2s;font-size:10px;font-weight:600;min-width:56px;}
.nav-btn .nav-icon{font-size:22px;transition:transform 0.2s;}
.nav-btn:active .nav-icon{transform:scale(0.8);}
.nav-btn.active{color:#f5c2e0;background:rgba(245,194,224,0.06);}
.nav-btn.active .nav-icon{filter:drop-shadow(0 0 6px rgba(245,194,224,0.3));}

/* ─── PAGE SYSTEM ─── */
.page-overlay{position:fixed;top:0;left:0;width:100%;height:100dvh;z-index:50;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:none;animation:fadeIn 0.2s ease-out;}
.page-overlay.show{display:block;}
@keyframes fadeIn{0%{opacity:0;}100%{opacity:1;}}
.page-panel{position:fixed;bottom:0;left:0;width:100%;max-height:85dvh;z-index:51;background:linear-gradient(180deg,#14121a 0%,#1a1625 100%);border-radius:20px 20px 0 0;display:none;animation:slideUp 0.3s cubic-bezier(0.16,1,0.3,1);}
.page-panel.show{display:flex;flex-direction:column;}
@keyframes slideUp{0%{transform:translateY(100%);opacity:0.5;}100%{transform:translateY(0);opacity:1;}}
.page-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid rgba(255,255,255,0.04);}
.page-header h2{font-size:18px;font-weight:800;color:#f5c2e0;}
.page-close{background:none;border:none;color:#888;font-size:24px;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:10px;transition:all 0.2s;}
.page-close:active{background:rgba(255,255,255,0.05);}
.page-body{flex:1;overflow-y:auto;padding:12px 20px 24px;-webkit-overflow-scrolling:touch;}

/* ─── SHOP ─── */
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding-bottom:20px;}
.shop-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.04);border-radius:14px;padding:14px;cursor:pointer;transition:all 0.2s;}
.shop-card:active{transform:scale(0.96);background:rgba(245,194,224,0.04);}
.shop-card .s-icon{font-size:28px;margin-bottom:4px;}
.shop-card .s-name{font-size:13px;font-weight:800;color:#eee;}
.shop-card .s-desc{font-size:10px;color:#888;font-weight:600;margin-top:2px;line-height:1.3;}
.shop-card .s-price{font-size:14px;font-weight:900;color:#ffd700;margin-top:6px;}

/* ─── WAIFUS ─── */
.waifu-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.waifu-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.04);border-radius:16px;padding:16px;text-align:center;cursor:pointer;transition:all 0.2s;}
.waifu-card:active{transform:scale(0.96);}
.waifu-card.selected{border-color:#f5c2e0;background:rgba(245,194,224,0.06);box-shadow:0 0 20px rgba(245,194,224,0.1);}
.waifu-card .w-emoji{font-size:40px;display:block;margin-bottom:6px;}
.waifu-card .w-name{font-size:14px;font-weight:800;color:#eee;}
.waifu-card .w-rarity{font-size:10px;font-weight:700;color:#888;margin-top:2px;}
.waifu-card .w-bonus{font-size:10px;font-weight:700;color:#ffd700;margin-top:4px;}
.waifu-card.selected .w-bonus{color:#4ade80;}

/* ─── DAILY ─── */
.daily-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin:12px 0;}
.d-day{aspect-ratio:1;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.04);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;font-weight:700;gap:1px;transition:all 0.25s;}
.d-day .dd-num{font-size:14px;font-weight:800;}
.d-day .dd-r{font-size:8px;color:#888;}
.d-day.claimed{border-color:#4ade80;background:rgba(74,222,128,0.06);}
.d-day.claimed .dd-r{color:#4ade80;}
.d-day.current{border-color:#f5c2e0;background:rgba(245,194,224,0.08);transform:scale(1.05);box-shadow:0 0 15px rgba(245,194,224,0.1);}
.d-day.locked{opacity:0.35;}
.daily-btn{width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#f5c2e0,#ff69b4);color:#fff;font-size:16px;font-weight:800;cursor:pointer;transition:all 0.2s;margin-top:8px;}
.daily-btn:active{transform:scale(0.97);}
.daily-btn:disabled{opacity:0.4;cursor:not-allowed;}

/* ─── LEADERBOARD ─── */
.lb-entry{display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid rgba(255,255,255,0.03);}
.lb-rank{font-size:18px;font-weight:900;min-width:34px;text-align:center;}
.lb-rank.gold{color:#ffd700;text-shadow:0 0 10px rgba(255,215,0,0.3);}
.lb-rank.silver{color:#c0c0c0;}
.lb-rank.bronze{color:#cd7f32;}
.lb-ava{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;background:rgba(245,194,224,0.06);}
.lb-info{flex:1;}
.lb-name{font-size:13px;font-weight:800;color:#eee;}
.lb-sub{font-size:10px;color:#888;font-weight:600;margin-top:1px;}
.lb-coins{font-size:14px;font-weight:900;color:#ffd700;}

/* ─── REFERRAL ─── */
.ref-section{text-align:center;padding:10px 0;}
.ref-icon{font-size:56px;margin-bottom:10px;}
.ref-title{font-size:20px;font-weight:800;color:#f5c2e0;margin-bottom:4px;}
.ref-desc{font-size:13px;color:#aaa;font-weight:600;margin-bottom:16px;line-height:1.5;}
.ref-stats{display:flex;justify-content:center;gap:32px;margin-bottom:16px;}
.ref-stat{text-align:center;}
.ref-stat .rs-v{font-size:28px;font-weight:900;color:#f5c2e0;}
.ref-stat .rs-l{font-size:11px;color:#888;font-weight:600;margin-top:2px;}
.ref-link-box{background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.04);border-radius:12px;padding:12px;margin-bottom:12px;font-size:11px;color:#f5c2e0;font-weight:700;word-break:break-all;}
.ref-copy-btn{width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#f5c2e0,#ff69b4);color:#fff;font-size:15px;font-weight:800;cursor:pointer;transition:all 0.2s;}
.ref-copy-btn:active{transform:scale(0.97);}

/* ─── AD BANNER ─── */
#adBanner{position:fixed;bottom:200px;left:50%;transform:translateX(-50%);z-index:40;display:none;background:linear-gradient(135deg,rgba(245,194,224,0.95),rgba(255,105,180,0.95));border-radius:16px;padding:12px 24px;backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1);cursor:pointer;animation:adUp 0.4s ease-out;box-shadow:0 8px 32px rgba(255,105,180,0.3);font-size:14px;font-weight:800;color:#fff;gap:8px;align-items:center;}
#adBanner .ad-dismiss{font-size:12px;color:rgba(255,255,255,0.5);margin-left:10px;}
@keyframes adUp{0%{opacity:0;transform:translateX(-50%) translateY(40px);}100%{opacity:1;transform:translateX(-50%) translateY(0);}}

/* ─── TOAST ─── */
#toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:100;background:rgba(15,10,25,0.96);border:1px solid rgba(245,194,224,0.15);border-radius:14px;padding:12px 22px;font-size:14px;font-weight:800;color:#fff;backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,0.5);display:none;max-width:88%;text-align:center;letter-spacing:0.3px;}
#toast.show{display:block;animation:toastIn 0.35s cubic-bezier(0.16,1,0.3,1);}
@keyframes toastIn{0%{opacity:0;transform:translateX(-50%) translateY(-15px) scale(0.9);}100%{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}}

/* ─── MODAL ─── */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100dvh;z-index:200;background:rgba(0,0,0,0.7);backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal-box{background:linear-gradient(180deg,#1a1625,#14121a);border:1px solid rgba(255,255,255,0.04);border-radius:24px;padding:28px 24px 20px;max-width:320px;width:90%;text-align:center;animation:modalIn 0.3s cubic-bezier(0.16,1,0.3,1);}
@keyframes modalIn{0%{opacity:0;transform:scale(0.9);}100%{opacity:1;transform:scale(1);}}
.modal-box h3{font-size:20px;font-weight:800;color:#f5c2e0;margin-bottom:8px;}
.modal-box p{font-size:14px;color:#bbb;font-weight:600;line-height:1.5;margin-bottom:16px;}
.modal-actions{display:flex;gap:8px;}
.modal-actions button{flex:1;padding:12px;border:none;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;transition:all 0.2s;background:linear-gradient(135deg,#f5c2e0,#ff69b4);color:#fff;}
.modal-actions button:active{transform:scale(0.96);}
.modal-actions button.sec{background:rgba(255,255,255,0.04);color:#888;}

/* ─── SCROLLBAR ─── */
.page-body::-webkit-scrollbar{width:2px;}
.page-body::-webkit-scrollbar-track{background:transparent;}
.page-body::-webkit-scrollbar-thumb{background:rgba(245,194,224,0.15);border-radius:10px;}

/* ─── RESPONSIVE ─── */
@media(max-width:360px){
  #waifu-wrap{width:220px;height:280px;}
  #hud{padding:8px 10px;}
  .shop-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="app">
  <!-- HUD -->
  <div id="hud">
    <div id="hud-coins">🪙 <span id="coinDisplay">0</span></div>
    <div class="hud-right">
      <div id="hud-stars">⭐ <span id="starDisplay">0</span></div>
    </div>
  </div>

  <!-- GAME AREA -->
  <div id="game">
    <div id="waifu-wrap">
      <img id="waifu-img" src="/assets/images/waifu1.svg" alt="waifu" draggable="false">
    </div>
    <div id="waifu-name">🌸 Сакура</div>
    <div id="tap-hint">👆 Тапай по вайфу!</div>
  </div>

  <!-- ENERGY -->
  <div id="energy-wrap">
    <div id="energy-bar">
      <span id="energy-icon">⚡</span>
      <div id="energy-track"><div id="energy-fill" style="width:100%"></div></div>
      <span id="energy-text">100/100</span>
    </div>
  </div>

  <!-- NAV -->
  <div id="nav">
    <button class="nav-btn" data-page="shop" onclick="openPage('shop')"><span class="nav-icon">🛍️</span>Магазин</button>
    <button class="nav-btn" data-page="waifus" onclick="openPage('waifus')"><span class="nav-icon">🌸</span>Вайфу</button>
    <button class="nav-btn" data-page="daily" onclick="openPage('daily')"><span class="nav-icon">🎁</span>Награды</button>
    <button class="nav-btn" data-page="referral" onclick="openPage('referral')"><span class="nav-icon">🔗</span>Друзья</button>
    <button class="nav-btn" data-page="leaderboard" onclick="openPage('leaderboard')"><span class="nav-icon">🏆</span>Топ</button>
  </div>
</div>

<!-- SHOP PAGE -->
<div class="page-overlay" id="ov-shop" onclick="closePage('shop')"></div>
<div class="page-panel" id="pp-shop">
  <div class="page-header"><h2>🛍️ Магазин</h2><button class="page-close" onclick="closePage('shop')">✕</button></div>
  <div class="page-body" id="shopContent"></div>
</div>

<!-- WAIFUS PAGE -->
<div class="page-overlay" id="ov-waifus" onclick="closePage('waifus')"></div>
<div class="page-panel" id="pp-waifus">
  <div class="page-header"><h2>🌸 Вайфу</h2><button class="page-close" onclick="closePage('waifus')">✕</button></div>
  <div class="page-body" id="waifuContent"></div>
</div>

<!-- DAILY PAGE -->
<div class="page-overlay" id="ov-daily" onclick="closePage('daily')"></div>
<div class="page-panel" id="pp-daily">
  <div class="page-header"><h2>🎁 Ежедневно</h2><button class="page-close" onclick="closePage('daily')">✕</button></div>
  <div class="page-body" id="dailyContent"></div>
</div>

<!-- REFERRAL PAGE -->
<div class="page-overlay" id="ov-referral" onclick="closePage('referral')"></div>
<div class="page-panel" id="pp-referral">
  <div class="page-header"><h2>🔗 Пригласить</h2><button class="page-close" onclick="closePage('referral')">✕</button></div>
  <div class="page-body" id="refContent"></div>
</div>

<!-- LEADERBOARD PAGE -->
<div class="page-overlay" id="ov-leaderboard" onclick="closePage('leaderboard')"></div>
<div class="page-panel" id="pp-leaderboard">
  <div class="page-header"><h2>🏆 Топ игроков</h2><button class="page-close" onclick="closePage('leaderboard')">✕</button></div>
  <div class="page-body" id="lbContent"></div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- AD BANNER -->
<div id="adBanner" onclick="this.style.display='none'">
  <span>🎯 Реклама · +50 🪙</span>
  <span class="ad-dismiss">✕</span>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <h3 id="modalTitle">🎉</h3>
    <p id="modalText"></p>
    <div class="modal-actions" id="modalBtns"></div>
  </div>
</div>

<script>
// ─── СТАНДАРТНЫЕ ШТУКИ (Telegram WebApp SDK) ───
const TG = (typeof window.Telegram !== 'undefined' && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
if (TG) { TG.expand(); TG.disableVerticalSwipes?.(); TG.setHeaderColor?.('#0a0a12'); }

// ─── СОСТОЯНИЕ ───
const state = { user: null, coins: 0, stars: 0, energy: 100, maxEnergy: 100, coinsPerTap: 1,
  totalTaps: 0, waifuId: 1, isGuest: false, tapLevel: 1 };
let toastTimer = null;
const WAIFUS = [
  { id: 1, name: 'Сакура', emoji: '🌸', rarity: '✨ Обычная', bonus: '+1 🪙 за тап', color: '#ff4488' },
  { id: 2, name: 'Микото', emoji: '⚡', rarity: '🔥 Редкая', bonus: '+2 🪙 за тап', color: '#4488ff' },
  { id: 3, name: 'Юки', emoji: '❄️', rarity: '🔥 Редкая', bonus: '+50 ⚡ энергия', color: '#8888cc' },
  { id: 4, name: 'Хотару', emoji: '✨', rarity: '💎 Эпическая', bonus: '+3 🪙 за тап', color: '#ffaa33' },
  { id: 5, name: 'Цукико', emoji: '🌙', rarity: '👑 Легендарная', bonus: '×2 🪙 за тап', color: '#bb66ff' }
];
const DAILY = [
  { day: 1, coins: 100, stars: 0 }, { day: 2, coins: 200, stars: 0 },
  { day: 3, coins: 300, stars: 0 }, { day: 4, coins: 500, stars: 1 },
  { day: 5, coins: 800, stars: 0 }, { day: 6, coins: 1200, stars: 2 },
  { day: 7, coins: 2000, stars: 5 }
];

// ─── ПАРС МОНЕТ ───
function fmtCoin(n) {
  if (n >= 1e6) return Math.floor(n/1e5)/10 + 'M';
  if (n >= 1e3) return n.toLocaleString('ru-RU');
  return String(Math.floor(n));
}

// ─── ИНИЦИАЛИЗАЦИЯ ───
async function init() {
  // Telegram или гость?
  let guestMode = false;
  if (!TG) guestMode = true;

  if (!guestMode) {
    try {
      // Таймаут 5 сек для Telegram auth
      const ctrl = new AbortController();
      const tm = setTimeout(() => ctrl.abort(), 5000);
      const r = await fetch('/api/auth', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({initData:TG.initData||'', referrerId:null}), signal: ctrl.signal });
      clearTimeout(tm);
      if (r.ok) {
        const d = await r.json();
        if (d.success) { state.user = d.user; applyUser(d.user); }
        else { guestMode = true; }
      } else { guestMode = true; }
    } catch(e) { guestMode = true; }
  }

  if (guestMode) {
    let gid = localStorage.getItem('wg_id');
    let gnm = localStorage.getItem('wg_name') || 'Анимешник';
    if (!gid) { gid = 'g_' + Math.random().toString(36).substr(2,9); localStorage.setItem('wg_id', gid); }
    try {
      const r = await fetch('/api/guest/auth', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({guest_id:gid, name:gnm}) });
      if (r.ok) {
        const d = await r.json();
        if (d.success) { state.user = d.user; state.isGuest = true; applyUser(d.user); }
      }
    } catch(e) {}
  }

  // Загружаем данные
  loadShop();
  loadWaifus();
  loadLB();
  loadDaily();

  // Реклама раз в 2 минуты
  setTimeout(() => { const b = document.getElementById('adBanner'); if(b) b.style.display='flex'; }, 120000);
  setInterval(() => { const b = document.getElementById('adBanner'); if(b) b.style.display='flex'; }, 120000);

  // Сообщаем Telegram что загрузились (даже если ошибка — скрываем спиннер)
  if (TG) TG.ready();

  // Телефонная вибрация на тап
  document.getElementById('waifu-wrap').addEventListener('click', onTap);
}

function applyUser(u) {
  state.coins = u.coins || 0;
  state.stars = u.stars || 0;
  state.energy = u.energy || 100;
  state.maxEnergy = u.max_energy || 100;
  state.coinsPerTap = u.coins_per_tap || 1;
  state.totalTaps = u.total_taps || 0;
  state.waifuId = u.current_waifu_id || 1;
  state.tapLevel = u.tap_level || 1;
  updateHUD();
  setWaifu(state.waifuId);
}

function setWaifu(id) {
  const w = WAIFUS.find(x => x.id === id) || WAIFUS[0];
  document.getElementById('waifu-img').src = '/assets/images/waifu' + id + '.svg?' + Date.now();
  document.getElementById('waifu-name').textContent = w.emoji + ' ' + w.name;
}

function updateHUD() {
  document.getElementById('coinDisplay').textContent = fmtCoin(state.coins);
  document.getElementById('starDisplay').textContent = fmtCoin(state.stars);
  const pct = state.maxEnergy > 0 ? Math.max(0, (state.energy / state.maxEnergy) * 100) : 0;
  document.getElementById('energy-fill').style.width = pct + '%';
  document.getElementById('energy-text').textContent = Math.floor(state.energy) + '/' + state.maxEnergy;
}

// ─── ТАП ───
async function onTap(e) {
  if (!state.user) { showToast('⏳ Загрузка...'); return; }
  if (state.energy < 1) { showToast('⚡ Нет энергии! Купи в магазине'); return; }

  // Минус энергия
  state.energy = Math.max(0, state.energy - 1);
  const earn = state.coinsPerTap * (state.waifuId === 5 ? 2 : 1);
  state.coins += earn;
  updateHUD();

  // Партиклы
  spawnParticles(e, earn);

  // Хептика
  if (navigator.vibrate) navigator.vibrate(10);

  // Отправка на сервер
  try {
    await fetch('/api/tap', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ telegram_id: state.user.telegram_id }) });
  } catch(e) {}
}

function spawnParticles(e, amount) {
  const wrap = document.getElementById('waifu-wrap');
  const rect = wrap.getBoundingClientRect();
  const cx = e.clientX || rect.left + rect.width/2;
  const cy = e.clientY || rect.top + rect.height/3;

  // +coin текст
  const el = document.createElement('div');
  el.className = 'tap-particle';
  el.textContent = '+🪙' + amount;
  el.style.left = (cx - rect.left + (Math.random()-0.5)*40) + 'px';
  el.style.top = (cy - rect.top + (Math.random()-0.5)*20) + 'px';
  el.style.fontSize = (16 + Math.random()*10) + 'px';
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 1000);

  // Несколько частиц
  for (let i=0; i<3; i++) {
    const p = document.createElement('div');
    p.className = 'tap-particle';
    p.textContent = ['✨','💫','🌸','⭐','❤️'][Math.floor(Math.random()*5)];
    p.style.left = (cx - rect.left + (Math.random()-0.5)*60) + 'px';
    p.style.top = (cy - rect.top + (Math.random()-0.5)*30) + 'px';
    p.style.fontSize = (14+Math.random()*12) + 'px';
    p.style.color = ['#ffd700','#f5c2e0','#ff69b4','#ff4488','#fff'][Math.floor(Math.random()*5)];
    wrap.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }
}

// ─── ЭНЕРГИЯ (реген) ───
setInterval(() => {
  if (!state.user || state.energy >= state.maxEnergy) return;
  const regenRate = state.isGuest ? 2 : 1;
  state.energy = Math.min(state.maxEnergy, state.energy + regenRate * 0.5);
  updateHUD();
}, 1500);

// ─── СТРАНИЦЫ ───
function openPage(name) {
  const ov = document.getElementById('ov-' + name);
  const pp = document.getElementById('pp-' + name);
  if (ov) ov.classList.add('show');
  if (pp) pp.classList.add('show');
  // Загружаем контент
  if (name === 'shop') loadShop();
  if (name === 'waifus') loadWaifus();
  if (name === 'daily') loadDaily();
  if (name === 'referral') loadRef();
  if (name === 'leaderboard') loadLB();
  // Подсветка нав-кнопки
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`.nav-btn[data-page="${name}"]`);
  if (btn) btn.classList.add('active');
}

function closePage(name) {
  const ov = document.getElementById('ov-' + name);
  const pp = document.getElementById('pp-' + name);
  if (ov) ov.classList.remove('show');
  if (pp) pp.classList.remove('show');
}

// ─── МАГАЗИН ───
let shopItems = [];

async function loadShop() {
  try {
    const r = await fetch('/api/shop');
    const d = await r.json();
    if (d.success) { shopItems = d.items; renderShop(); }
  } catch(e) { showToast('❌ Ошибка магазина'); }
}

function renderShop() {
  const c = document.getElementById('shopContent');
  if (!shopItems.length) { c.innerHTML = '<p style="text-align:center;color:#666;padding:20px;font-weight:600;">Магазин пуст</p>'; return; }
  c.innerHTML = '<div class="shop-grid">' + shopItems.map(item => {
    const isStar = item.price_type === 'stars';
    return `<div class="shop-card" onclick="buyItem(${item.id})">
      <div class="s-icon">${item.emoji || '📦'}</div>
      <div class="s-name">${item.name}</div>
      <div class="s-desc">${item.description || ''}</div>
      <div class="s-price">${isStar ? '⭐' : '🪙'} ${fmtCoin(item.price)}</div>
    </div>`;
  }).join('') + '</div>';
}

async function buyItem(itemId) {
  if (!state.user) return;
  try {
    const r = await fetch('/api/shop/buy', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ telegram_id: state.user.telegram_id, item_id: itemId }) });
    const d = await r.json();
    if (d.success) {
      showToast(`✅ ${d.item_emoji||'📦'} ${d.item || 'Куплено!'}`);
      loadUserData();
    } else {
      showToast('❌ ' + (d.error || 'Недостаточно средств'));
    }
  } catch(e) { showToast('❌ Ошибка'); }
}

async function loadUserData() {
  if (!state.user) return;
  try {
    const r = await fetch('/api/user/' + state.user.telegram_id);
    const d = await r.json();
    if (d.success) { state.user = d.user; applyUser(d.user); }
  } catch(e) {}
}

// ─── ВАЙФУ ───
let allWaifus = [];

async function loadWaifus() {
  try {
    const r = await fetch('/api/waifus');
    const d = await r.json();
    if (d.success) { allWaifus = d.waifus || []; renderWaifus(); }
  } catch(e) {}
}

function renderWaifus() {
  const c = document.getElementById('waifuContent');
  if (!allWaifus.length) { c.innerHTML = '<p style="text-align:center;color:#666;padding:20px;">Нет вайфу</p>'; return; }
  c.innerHTML = '<div class="waifu-grid">' + allWaifus.map(w => {
    const sel = w.id === state.waifuId;
    const waifu = WAIFUS.find(x => x.id === w.id) || {};
    return `<div class="waifu-card${sel?' selected':''}" onclick="selectWaifu(${w.id})">
      <span class="w-emoji">${waifu.emoji||'🌸'}</span>
      <div class="w-name">${waifu.name||w.name}</div>
      <div class="w-rarity">${waifu.rarity||'Обычная'}</div>
      <div class="w-bonus">${waifu.bonus||''}</div>
    </div>`;
  }).join('') + '</div>';
}

async function selectWaifu(id) {
  if (!state.user) return;
  if (id === state.waifuId) { closePage('waifus'); return; }
  try {
    const r = await fetch('/api/waifu/select', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ telegram_id: state.user.telegram_id, waifu_id: id }) });
    const d = await r.json();
    if (d.success) {
      state.waifuId = id;
      setWaifu(id);
      loadUserData();
      renderWaifus();
      showToast(`🌸 ${d.waifu || 'Вайфу выбрана!'}`);
      closePage('waifus');
    } else {
      showToast('❌ ' + (d.error || 'Недоступна'));
    }
  } catch(e) { showToast('❌ Ошибка'); }
}

// ─── ЕЖЕДНЕВКА ───
let dailyData = {};

async function loadDaily() {
  if (!state.user) return;
  try {
    const r = await fetch('/api/daily/status/' + state.user.telegram_id);
    const d = await r.json();
    if (d.success) { dailyData = d; renderDaily(); }
  } catch(e) {}
}

function renderDaily() {
  const c = document.getElementById('dailyContent');
  const next = dailyData.next_day || 1;
  const avail = dailyData.available || false;
  c.innerHTML = `<div style="text-align:center;margin-bottom:14px;">
    <div style="font-size:36px;margin-bottom:4px;">📅</div>
    <p style="font-size:13px;color:#aaa;font-weight:600;">Заходи каждый день и получай бонусы!</p>
  </div>
  <div class="daily-grid">${DAILY.map(r => {
    let cls = 'd-day locked';
    if (r.day < next) cls = 'd-day claimed';
    else if (r.day === next && avail) cls = 'd-day current';
    return `<div class="${cls}">
      <div class="dd-num">${r.day}</div>
      <div class="dd-r">🪙${r.coins}</div>
      ${r.stars > 0 ? `<div class="dd-r">⭐${r.stars}</div>` : ''}
    </div>`;
  }).join('')}</div>
  <button class="daily-btn" id="dailyBtn" onclick="claimDaily()" ${!avail?'disabled':''}>
    ${avail ? '🎁 Забрать!' : '✅ Уже сегодня'}
  </button>
  <div style="text-align:center;margin-top:10px;font-size:12px;color:#888;font-weight:600;">
    ${avail ? `День ${next}/7 — награда готова!` : `Следующая: день ${next}/7`}
  </div>`;
}

async function claimDaily() {
  if (!state.user || !dailyData.available) return;
  try {
    const r = await fetch('/api/daily/claim', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ telegram_id: state.user.telegram_id }) });
    const d = await r.json();
    if (d.success) {
      showModal('🎉 Ежедневная награда!', `🪙 +${d.coins} монет${d.stars > 0 ? '\n⭐ +' + d.stars + ' Stars' : ''}`);
      state.coins += d.coins || 0;
      state.stars += d.stars || 0;
      updateHUD();
      loadDaily();
    } else {
      showToast('❌ ' + (d.error || 'Ошибка'));
    }
  } catch(e) { showToast('❌ Ошибка'); }
}

// ─── ЛИДЕРБОРД ───
async function loadLB() {
  try {
    const r = await fetch('/api/leaderboard?limit=30');
    const d = await r.json();
    if (d.success) renderLB(d.leaderboard || []);
  } catch(e) {}
}

function renderLB(entries) {
  const c = document.getElementById('lbContent');
  if (!entries.length) { c.innerHTML = '<p style="text-align:center;color:#666;padding:30px;font-weight:600;">Пока пусто 😢</p>'; return; }
  c.innerHTML = entries.map((e, i) => {
    const rc = i===0?'gold':i===1?'silver':i===2?'bronze':'';
    const me = state.user && e.telegram_id === state.user.telegram_id;
    const pos = i<3 ? ['🥇','🥈','🥉'][i] : `<span style="font-weight:800;color:#555;">${i+1}</span>`;
    const em = e.waifu?.emoji || '🌸';
    return `<div class="lb-entry" style="${me?'background:rgba(245,194,224,0.04);border-radius:8px;':''}">
      <div class="lb-rank ${rc}">${pos}</div>
      <div class="lb-ava">${em}</div>
      <div class="lb-info">
        <div class="lb-name">${e.name}${me?' 👈':''}</div>
        <div class="lb-sub">${e.waifu?.name||'—'} · ${fmtCoin(e.total_taps||0)} тапов</div>
      </div>
      <div class="lb-coins">🪙 ${fmtCoin(e.coins)}</div>
    </div>`;
  }).join('');
}

// ─── РЕФЕРАЛЫ ───
async function loadRef() {
  const c = document.getElementById('refContent');
  if (!state.user) { c.innerHTML = '<p style="text-align:center;color:#666;padding:20px;">Авторизуйся</p>'; return; }
  let refCount = 0, refBonus = 0;
  try {
    const r = await fetch('/api/referral/' + state.user.telegram_id);
    const d = await r.json();
    if (d.success) { refCount = d.referral_count || 0; refBonus = d.total_bonus || 0; }
  } catch(e) {}
  const link = 'https://t.me/W3ifuTapBot?start=ref_' + state.user.telegram_id;
  c.innerHTML = `<div class="ref-section">
    <div class="ref-icon">🤝</div>
    <div class="ref-title">Приглашай друзей!</div>
    <div class="ref-desc">Ты и друг получаете <b style="color:#ffd700;">+500 🪙</b><br>Чем больше друзей — тем больше бонус!</div>
    <div class="ref-stats">
      <div class="ref-stat"><div class="rs-v">${refCount}</div><div class="rs-l">Друзей</div></div>
      <div class="ref-stat"><div class="rs-v" style="color:#ffd700;">🪙${fmtCoin(refBonus)}</div><div class="rs-l">Бонус</div></div>
    </div>
    <div class="ref-link-box">${link}</div>
    <button class="ref-copy-btn" onclick="copyRef('${link}')">📋 Копировать ссылку</button>
    <p style="color:#555;font-size:11px;font-weight:600;margin-top:12px;">🔥 Кинь ссылку в чаты про аниме!</p>
  </div>`;
}

function copyRef(link) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(link).then(() => showToast('✅ Ссылка скопирована!'));
  } else {
    const el = document.createElement('textarea');
    el.value = link;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast('✅ Ссылка скопирована!');
  }
}

// ─── ТОСТ ───
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ─── МОДАЛКА ───
function showModal(title, text) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalText').textContent = text;
  document.getElementById('modalBtns').innerHTML = '<button onclick="closeModal()">🎉 Круто!</button>';
  document.getElementById('modal').classList.add('show');
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }

// ─── СТАРТ ───
document.addEventListener('DOMContentLoaded', init);
if (document.readyState === 'complete') init();
</script>
