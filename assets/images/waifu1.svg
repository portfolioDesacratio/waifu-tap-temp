<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <clipPath id="circle">
      <circle cx="150" cy="150" r="145"/>
    </clipPath>
  </defs>
  <g clip-path="url(#circle)">
    <!-- Skin -->
    <rect x="0" y="0" width="300" height="300" fill="#FFE4D6"/>
    <!-- Hair back -->
    <ellipse cx="150" cy="160" rx="108" ry="125" fill="#CC2200"/>
    <ellipse cx="150" cy="155" rx="100" ry="118" fill="#DD2A00"/>
    <!-- Face -->
    <ellipse cx="150" cy="170" rx="66" ry="76" fill="#FFE4D6"/>
    <!-- Neck -->
    <rect x="128" y="234" width="44" height="28" fill="#FFE4D6"/>
    <rect x="132" y="236" width="36" height="8" fill="#F5D5C5" opacity="0.4"/>
    <!-- Body / Plugsuit red -->
    <rect x="86" y="244" width="128" height="66" rx="12" fill="#D42A2A"/>
    <!-- Plugsuit shoulders -->
    <path d="M86 252 Q60 238 50 260 L50 310 L86 310 Z" fill="#D42A2A"/>
    <path d="M214 252 Q240 238 250 260 L250 310 L214 310 Z" fill="#D42A2A"/>
    <!-- Plugsuit orange accents -->
    <rect x="86" y="264" width="128" height="6" rx="3" fill="#FF8C00"/>
    <rect x="86" y="278" width="128" height="6" rx="3" fill="#FF8C00"/>
    <!-- Plugsuit detail lines -->
    <line x1="86" y1="272" x2="214" y2="272" stroke="#FF8C00" stroke-width="1.5" opacity="0.5"/>
    <!-- Plugsuit collar -->
    <rect x="108" y="238" width="84" height="14" rx="6" fill="#FF8C00"/>
    <rect x="112" y="240" width="76" height="10" rx="4" fill="#FFA500"/>
    <!-- Collar ring -->
    <circle cx="150" cy="245" r="6" fill="none" stroke="#E63946" stroke-width="2"/>
    <circle cx="150" cy="245" r="3" fill="#E63946"/>
    <!-- Hair bangs -->
    <path d="M82 138 Q82 70 150 58 Q218 70 218 138" fill="#CC2200"/>
    <path d="M86 138 Q86 75 150 64 Q214 75 214 138" fill="#DD2A00"/>
    <!-- Hair highlights -->
    <path d="M110 90 Q115 80 125 80" fill="none" stroke="#FF6644" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M175 80 Q185 80 190 90" fill="none" stroke="#FF6644" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <!-- Side hair left -->
    <path d="M82 138 Q76 180 86 228" fill="none" stroke="#CC2200" stroke-width="22" stroke-linecap="round"/>
    <path d="M84 138 Q78 178 88 226" fill="none" stroke="#DD2A00" stroke-width="18" stroke-linecap="round"/>
    <!-- Side hair right -->
    <path d="M218 138 Q224 180 214 228" fill="none" stroke="#CC2200" stroke-width="22" stroke-linecap="round"/>
    <path d="M216 138 Q222 178 212 226" fill="none" stroke="#DD2A00" stroke-width="18" stroke-linecap="round"/>
    <!-- Hair twintails -->
    <ellipse cx="72" cy="175" rx="24" ry="48" transform="rotate(-18 72 175)" fill="#CC2200"/>
    <ellipse cx="72" cy="175" rx="20" ry="44" transform="rotate(-18 72 175)" fill="#DD2A00"/>
    <ellipse cx="228" cy="175" rx="24" ry="48" transform="rotate(18 228 175)" fill="#CC2200"/>
    <ellipse cx="228" cy="175" rx="20" ry="44" transform="rotate(18 228 175)" fill="#DD2A00"/>
    <!-- Hair ribbon left -->
    <path d="M92 135 L68 122 L88 148 Z" fill="#E63946" stroke="#CC2233" stroke-width="1"/>
    <path d="M92 135 L75 128 L82 145 Z" fill="#FF5566"/>
    <ellipse cx="65" cy="128" rx="5" ry="12" transform="rotate(-25 65 128)" fill="#E63946"/>
    <!-- Hair ribbon right -->
    <path d="M208 135 L232 122 L212 148 Z" fill="#E63946" stroke="#CC2233" stroke-width="1"/>
    <path d="M208 135 L225 128 L218 145 Z" fill="#FF5566"/>
    <ellipse cx="235" cy="128" rx="5" ry="12" transform="rotate(25 235 128)" fill="#E63946"/>
    <!-- Eyes -->
    <!-- Left eye -->
    <ellipse cx="118" cy="166" rx="17" ry="19" fill="white"/>
    <ellipse cx="118" cy="168" rx="15" ry="16" fill="#4A7FB5"/>
    <ellipse cx="118" cy="171" rx="11" ry="12" fill="#2B5F8A"/>
    <ellipse cx="118" cy="173" rx="6" ry="7" fill="#1A3F6A"/>
    <circle cx="113" cy="161" r="5.5" fill="white"/>
    <circle cx="123" cy="173" r="3" fill="white"/>
    <circle cx="108" cy="165" r="2" fill="white" opacity="0.6"/>
    <!-- Right eye -->
    <ellipse cx="182" cy="166" rx="17" ry="19" fill="white"/>
    <ellipse cx="182" cy="168" rx="15" ry="16" fill="#4A7FB5"/>
    <ellipse cx="182" cy="171" rx="11" ry="12" fill="#2B5F8A"/>
    <ellipse cx="182" cy="173" rx="6" ry="7" fill="#1A3F6A"/>
    <circle cx="177" cy="161" r="5.5" fill="white"/>
    <circle cx="187" cy="173" r="3" fill="white"/>
    <circle cx="192" cy="165" r="2" fill="white" opacity="0.6"/>
    <!-- Eyebrows -->
    <path d="M100 146 Q114 136 136 144" fill="none" stroke="#8B2020" stroke-width="3" stroke-linecap="round"/>
    <path d="M164 144 Q186 136 200 146" fill="none" stroke="#8B2020" stroke-width="3" stroke-linecap="round"/>
    <!-- Mouth - confident smirk -->
    <path d="M128 192 Q143 203 158 190" fill="none" stroke="#CC4444" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M158 190 Q165 186 170 192" fill="none" stroke="#CC4444" stroke-width="2" stroke-linecap="round"/>
    <!-- Teeth visible -->
    <rect x="135" y="192" width="16" height="4" rx="1" fill="white" opacity="0.6"/>
    <!-- Blush -->
    <ellipse cx="106" cy="187" rx="14" ry="7" fill="#FFB5B5" opacity="0.5"/>
    <ellipse cx="194" cy="187" rx="14" ry="7" fill="#FFB5B5" opacity="0.5"/>
    <!-- Headband -->
    <rect x="94" y="134" width="112" height="7" rx="3.5" fill="#FF8C00"/>
    <rect x="94" y="135" width="112" height="3" rx="1.5" fill="#FFAA33" opacity="0.5"/>
    <!-- Headband ends -->
    <rect x="82" y="133" width="16" height="8" rx="3" fill="#FF8C00" transform="rotate(-10 82 133)"/>
    <rect x="202" y="133" width="16" height="8" rx="3" fill="#FF8C00" transform="rotate(10 202 133)"/>
    <!-- Fill bottom -->
    <rect x="0" y="285" width="300" height="15" fill="#D42A2A"/>
    <!-- Decor ring -->
    <circle cx="150" cy="150" r="135" fill="none" stroke="#FF8C00" stroke-width="0.5" opacity="0.3"/>
    <circle cx="150" cy="150" r="125" fill="none" stroke="#CC2200" stroke-width="0.5" opacity="0.2"/>
  </g>
  <!-- Border -->
  <circle cx="150" cy="150" r="145" fill="none" stroke="#CC2200" stroke-width="3"/>
</svg>
