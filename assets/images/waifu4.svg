<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <clipPath id="circle">
      <circle cx="150" cy="150" r="145"/>
    </clipPath>
  </defs>
  <g clip-path="url(#circle)">
    <!-- Skin -->
    <rect x="0" y="0" width="300" height="300" fill="#FDE8D0"/>
    <!-- Hair back -->
    <ellipse cx="150" cy="155" rx="110" ry="128" fill="#C05A1A"/>
    <ellipse cx="150" cy="152" rx="104" ry="122" fill="#D4722E"/>
    <!-- Face -->
    <ellipse cx="150" cy="170" rx="64" ry="74" fill="#FDE8D0"/>
    <!-- Neck -->
    <rect x="130" y="232" width="40" height="26" fill="#FDE8D0"/>
    <rect x="133" y="234" width="34" height="6" fill="#EDD0B0" opacity="0.4"/>
    <!-- Body / Blazer -->
    <rect x="88" y="244" width="124" height="66" rx="10" fill="#3A3A3A"/>
    <rect x="88" y="244" width="124" height="66" rx="10" fill="#4A4A4A" opacity="0.4"/>
    <!-- Collar white -->
    <path d="M128 244 Q150 264 172 244" fill="white" stroke="#EEE" stroke-width="1.5"/>
    <path d="M132 244 L150 262 L168 244" fill="#FAFAFA"/>
    <!-- Blazer lapels -->
    <path d="M128 244 L140 266 L128 290 Z" fill="#3A3A3A"/>
    <path d="M172 244 L160 266 L172 290 Z" fill="#3A3A3A"/>
    <path d="M128 244 L138 264 L128 286 Z" fill="#444" opacity="0.5"/>
    <path d="M172 244 L162 264 L172 286 Z" fill="#444" opacity="0.5"/>
    <!-- Tie -->
    <rect x="143" y="256" width="14" height="40" rx="2" fill="#8B0000"/>
    <rect x="145" y="258" width="10" height="36" rx="1" fill="#AA1122"/>
    <!-- Tie knot -->
    <polygon points="141,252 159,252 154,258 146,258" fill="#8B0000"/>
    <!-- Button -->
    <circle cx="150" cy="275" r="2" fill="#666"/>
    <!-- Hair bangs -->
    <path d="M84 138 Q84 62 150 55 Q216 62 216 138" fill="#D4722E"/>
    <path d="M88 138 Q88 68 150 60 Q212 68 212 138" fill="#E8853E"/>
    <!-- Swept bangs -->
    <path d="M92 138 Q92 82 150 74 Q208 82 208 138" fill="#E8904A" opacity="0.5"/>
    <!-- Hair strands -->
    <path d="M98 118 Q96 95 102 84" fill="none" stroke="#E8904A" stroke-width="3" stroke-linecap="round"/>
    <path d="M108 102 Q106 88 112 80" fill="none" stroke="#E8904A" stroke-width="3" stroke-linecap="round"/>
    <path d="M190 102 Q194 88 188 80" fill="none" stroke="#E8904A" stroke-width="3" stroke-linecap="round"/>
    <path d="M202 118 Q204 95 198 84" fill="none" stroke="#E8904A" stroke-width="3" stroke-linecap="round"/>
    <!-- Side hair -->
    <path d="M84 138 Q78 182 88 240" fill="none" stroke="#D4722E" stroke-width="24" stroke-linecap="round"/>
    <path d="M216 138 Q222 182 212 240" fill="none" stroke="#D4722E" stroke-width="24" stroke-linecap="round"/>
    <path d="M86 138 Q80 180 90 238" fill="none" stroke="#E8853E" stroke-width="18" stroke-linecap="round"/>
    <path d="M214 138 Q220 180 210 238" fill="none" stroke="#E8853E" stroke-width="18" stroke-linecap="round"/>
    <!-- Eyes - red -->
    <!-- Left eye -->
    <ellipse cx="124" cy="168" rx="16" ry="18" fill="white"/>
    <ellipse cx="124" cy="170" rx="14" ry="15" fill="#CC3333"/>
    <ellipse cx="124" cy="173" rx="10" ry="11" fill="#991111"/>
    <ellipse cx="124" cy="175" rx="5" ry="6" fill="#770000"/>
    <circle cx="119" cy="165" r="5" fill="white"/>
    <circle cx="129" cy="177" r="2.5" fill="white"/>
    <circle cx="114" cy="168" r="2" fill="white" opacity="0.5"/>
    <!-- Right eye -->
    <ellipse cx="176" cy="168" rx="16" ry="18" fill="white"/>
    <ellipse cx="176" cy="170" rx="14" ry="15" fill="#CC3333"/>
    <ellipse cx="176" cy="173" rx="10" ry="11" fill="#991111"/>
    <ellipse cx="176" cy="175" rx="5" ry="6" fill="#770000"/>
    <circle cx="171" cy="165" r="5" fill="white"/>
    <circle cx="181" cy="177" r="2.5" fill="white"/>
    <circle cx="186" cy="168" r="2" fill="white" opacity="0.5"/>
    <!-- Eyebrows -->
    <path d="M106 149 Q124 142 142 147" fill="none" stroke="#A0551A" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M158 147 Q176 142 194 149" fill="none" stroke="#A0551A" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Mouth - calm smile -->
    <path d="M138 192 Q150 198 162 192" fill="none" stroke="#D4888A" stroke-width="2" stroke-linecap="round"/>
    <!-- Blush -->
    <ellipse cx="110" cy="186" rx="12" ry="6" fill="#FFB5B5" opacity="0.3"/>
    <ellipse cx="190" cy="186" rx="12" ry="6" fill="#FFB5B5" opacity="0.3"/>
    <!-- Choker collar -->
    <rect x="116" y="230" width="68" height="8" rx="4" fill="#8B0000"/>
    <rect x="118" y="231" width="64" height="5" rx="2.5" fill="#AA1122"/>
    <!-- Collar charm -->
    <circle cx="150" cy="234" r="5" fill="#FFD700"/>
    <circle cx="150" cy="234" r="3.5" fill="#DAA520"/>
    <circle cx="150" cy="234" r="1.5" fill="#B8860B"/>
    <!-- Ring below collar -->
    <circle cx="150" cy="240" r="2" fill="#FFD700"/>
    <!-- Fill bottom -->
    <rect x="0" y="285" width="300" height="15" fill="#4A4A4A"/>
    <!-- Decor ring -->
    <circle cx="150" cy="150" r="135" fill="none" stroke="#D4722E" stroke-width="0.5" opacity="0.3"/>
    <circle cx="150" cy="150" r="125" fill="none" stroke="#CC3333" stroke-width="0.5" opacity="0.2"/>
  </g>
  <!-- Border -->
  <circle cx="150" cy="150" r="145" fill="none" stroke="#C05A1A" stroke-width="3"/>
</svg>
