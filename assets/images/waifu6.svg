<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <clipPath id="circle">
      <circle cx="150" cy="150" r="145"/>
    </clipPath>
  </defs>
  <g clip-path="url(#circle)">
    <!-- Skin -->
    <rect x="0" y="0" width="300" height="300" fill="#FDE8D0"/>
    <!-- Hair back -->
    <ellipse cx="150" cy="155" rx="104" ry="124" fill="#14142A"/>
    <ellipse cx="150" cy="152" rx="98" ry="118" fill="#242440"/>
    <!-- Face -->
    <ellipse cx="150" cy="168" rx="64" ry="74" fill="#FDE8D0"/>
    <!-- Neck -->
    <rect x="130" y="230" width="40" height="26" fill="#FDE8D0"/>
    <rect x="133" y="232" width="34" height="6" fill="#EDD0B0" opacity="0.4"/>
    <!-- Body / Red dress -->
    <rect x="85" y="244" width="130" height="66" rx="12" fill="#BB1122"/>
    <rect x="85" y="244" width="130" height="66" rx="12" fill="#CC2233" opacity="0.5"/>
    <!-- Dress neckline -->
    <path d="M115 244 Q150 264 185 244" fill="#BB1122" stroke="#991122" stroke-width="1.5"/>
    <path d="M118 244 Q150 262 182 244" fill="#CC2233"/>
    <!-- Collar white -->
    <path d="M128 244 L142 258 L158 258 L172 244" fill="white" stroke="#EEE" stroke-width="1"/>
    <path d="M130 244 L142 256 L158 256 L170 244" fill="#FAFAFA"/>
    <!-- Brooch -->
    <circle cx="150" cy="250" r="5" fill="#FFD700"/>
    <circle cx="150" cy="250" r="3.5" fill="#DAA520"/>
    <circle cx="150" cy="250" r="1.5" fill="#B8860B"/>
    <!-- Dress roses -->
    <circle cx="98" cy="268" r="4" fill="#FF4455" opacity="0.6"/>
    <circle cx="202" cy="268" r="4" fill="#FF4455" opacity="0.6"/>
    <circle cx="92" cy="280" r="3" fill="#FF4455" opacity="0.5"/>
    <circle cx="208" cy="280" r="3" fill="#FF4455" opacity="0.5"/>
    <!-- Hair up in bun -->
    <ellipse cx="150" cy="86" rx="38" ry="34" fill="#14142A"/>
    <ellipse cx="150" cy="84" rx="34" ry="30" fill="#242440"/>
    <!-- Hair bun top -->
    <ellipse cx="150" cy="74" rx="30" ry="24" fill="#14142A"/>
    <ellipse cx="150" cy="72" rx="26" ry="20" fill="#242440"/>
    <ellipse cx="145" cy="68" rx="14" ry="10" fill="#343460" opacity="0.4"/>
    <!-- Hair base -->
    <path d="M84 128 Q84 96 118 82 Q128 76 150 78 Q172 76 182 82 Q216 96 216 128" fill="#14142A"/>
    <path d="M86 128 Q86 98 118 84 Q128 78 150 80 Q172 78 182 84 Q214 98 214 128" fill="#242440"/>
    <!-- Hair bun details -->
    <path d="M135 70 Q140 62 148 64" fill="none" stroke="#343460" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <path d="M152 64 Q160 62 165 70" fill="none" stroke="#343460" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <!-- Side hair -->
    <path d="M84 128 Q78 168 88 230" fill="none" stroke="#14142A" stroke-width="20" stroke-linecap="round"/>
    <path d="M216 128 Q222 168 212 230" fill="none" stroke="#14142A" stroke-width="20" stroke-linecap="round"/>
    <path d="M86 128 Q80 166 90 228" fill="none" stroke="#242440" stroke-width="16" stroke-linecap="round"/>
    <path d="M214 128 Q220 166 210 228" fill="none" stroke="#242440" stroke-width="16" stroke-linecap="round"/>
    <!-- Eyes - gold -->
    <!-- Left eye -->
    <ellipse cx="124" cy="166" rx="16" ry="18" fill="white"/>
    <ellipse cx="124" cy="168" rx="14" ry="15" fill="#C8960C"/>
    <ellipse cx="124" cy="171" rx="10" ry="11" fill="#A87A08"/>
    <ellipse cx="124" cy="173" rx="5" ry="6" fill="#886000"/>
    <circle cx="119" cy="163" r="5" fill="white"/>
    <circle cx="129" cy="175" r="2.5" fill="white"/>
    <circle cx="114" cy="166" r="2" fill="white" opacity="0.5"/>
    <!-- Right eye -->
    <ellipse cx="176" cy="166" rx="16" ry="18" fill="white"/>
    <ellipse cx="176" cy="168" rx="14" ry="15" fill="#C8960C"/>
    <ellipse cx="176" cy="171" rx="10" ry="11" fill="#A87A08"/>
    <ellipse cx="176" cy="173" rx="5" ry="6" fill="#886000"/>
    <circle cx="171" cy="163" r="5" fill="white"/>
    <circle cx="181" cy="175" r="2.5" fill="white"/>
    <circle cx="186" cy="166" r="2" fill="white" opacity="0.5"/>
    <!-- Eyebrows -->
    <path d="M106 148 Q124 142 142 147" fill="none" stroke="#111122" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M158 147 Q176 142 194 148" fill="none" stroke="#111122" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Mysterious smile -->
    <path d="M136 190 Q146 197 154 194 Q162 197 168 190" fill="none" stroke="#CC4466" stroke-width="2" stroke-linecap="round"/>
    <!-- Blush -->
    <ellipse cx="108" cy="184" rx="12" ry="6" fill="#FFB5B5" opacity="0.35"/>
    <ellipse cx="192" cy="184" rx="12" ry="6" fill="#FFB5B5" opacity="0.35"/>
    <!-- Earrings -->
    <circle cx="92" cy="195" r="3.5" fill="#FFD700"/>
    <circle cx="92" cy="195" r="2" fill="#DAA520"/>
    <circle cx="208" cy="195" r="3.5" fill="#FFD700"/>
    <circle cx="208" cy="195" r="2" fill="#DAA520"/>
    <!-- Fill bottom -->
    <rect x="0" y="285" width="300" height="15" fill="#BB1122"/>
    <!-- Decor ring -->
    <circle cx="150" cy="150" r="135" fill="none" stroke="#BB1122" stroke-width="0.5" opacity="0.3"/>
    <circle cx="150" cy="150" r="125" fill="none" stroke="#FFD700" stroke-width="0.5" opacity="0.15"/>
  </g>
  <!-- Border -->
  <circle cx="150" cy="150" r="145" fill="none" stroke="#BB1122" stroke-width="3"/>
</svg>
